<html>
<head>
  <title>Guard System Settings</title>
  <script type="module">
    import { store } from "/components/plugins/plugin-settings-store.js";
  </script>
</head>
<body>
  <div x-data>
    <template x-if="$store.pluginSettings">
      <div x-init="$store.pluginSettings.onOpen()">

        <div style="display: flex; flex-direction: column; gap: 16px; max-width: 500px; padding: 8px;">

          <!-- Enabled -->
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox" x-model="$store.pluginSettings.settings.enabled" />
            <span>Enabled</span>
          </label>

          <!-- Max Prompt Length -->
          <div style="display: flex; flex-direction: column; gap: 4px;">
            <label for="max_prompt_length">Max Prompt Length (chars)</label>
            <input
              id="max_prompt_length"
              type="number"
              min="1000"
              step="10000"
              x-model.number="$store.pluginSettings.settings.max_prompt_length"
              style="padding: 6px; border: 1px solid #ccc; border-radius: 4px; width: 200px;"
            />
          </div>

          <!-- Injection Detection -->
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox" x-model="$store.pluginSettings.settings.injection_detection" />
            <span>Injection Detection</span>
          </label>

          <!-- Injection Patterns -->
          <div style="display: flex; flex-direction: column; gap: 4px;">
            <label for="injection_patterns">Injection Patterns (one per line, supports regex)</label>
            <textarea
              id="injection_patterns"
              rows="8"
              x-model="$store.pluginSettings.settings._injection_patterns_text"
              x-init="
                $watch('$store.pluginSettings.settings.injection_patterns', (val) => {
                  if (Array.isArray(val)) {
                    $store.pluginSettings.settings._injection_patterns_text = val.join('\n');
                  }
                });
                $watch('$store.pluginSettings.settings._injection_patterns_text', (val) => {
                  if (typeof val === 'string') {
                    $store.pluginSettings.settings.injection_patterns = val.split('\n').filter(l => l.trim());
                  }
                });
                if (Array.isArray($store.pluginSettings.settings.injection_patterns)) {
                  $store.pluginSettings.settings._injection_patterns_text = $store.pluginSettings.settings.injection_patterns.join('\n');
                }
              "
              style="padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; font-size: 13px; resize: vertical;"
            ></textarea>
          </div>

        </div>

      </div>
    </template>
  </div>
</body>
</html>
